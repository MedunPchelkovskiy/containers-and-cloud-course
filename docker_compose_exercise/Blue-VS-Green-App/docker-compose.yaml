services:
  vote:
    build:
      context: ./vote
    command: python app.py
    volumes:
      - ./vote:/app
    ports:
      - "5000:80"
    networks:
      - backend
      - frontend


  result:
    build:
      context: ./result
    volumes:
      - ./result:/app
    ports:
      - "5001:80"
    networks:
      - backend
      - frontend

  worker:
    build:
      context: ./worker/src/Worker
      dockerfile: ../../Dockerfile
    networks:
      - backend

  redis:
    image: redis:latest
    networks:
      - backend


  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - backend

networks:
  frontend:
  backend:

volumes:
  db-data:
